data:
  root_dir: "data/ISIC_2019"
  image_size: 224
  batch_size: 32
  num_workers: 4
  val_split: 0.15
  test_split: 0.10

model:
  backbone: "resnet50"
  num_classes: 8
  pretrained: true
  dropout: 0.4

training:
  epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.00001
  scheduler: "cosine"
  early_stopping_patience: 5

paths:
  checkpoint_dir: "outputs/checkpoints"
  figures_dir: "outputs/figures"

seed: 42